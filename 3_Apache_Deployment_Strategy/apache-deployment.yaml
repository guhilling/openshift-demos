apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: apache
  name: apache
spec:
  replicas: 4
  selector:
    matchLabels:
      app: apache
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: apache
    spec:
      containers:
      - image: quay.io/ghilling/apache-demo:1.2
        name: apache-demo
        resources: {}
        env:
          - name: COURSE
            value: DO280
          - name: VERSION
            value: "1"
        ports:
          - name: http
            containerPort: 8080
