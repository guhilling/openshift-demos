apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: apache
  name: apache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apache
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: apache
    spec:
      containers:
      - image: quay.io/ghilling/apache-demo:1.2
        name: apache-demo
        resources: {}
        ports:
          - name: http
            containerPort: 8080
